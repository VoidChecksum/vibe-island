<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#00D4FF;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a" />
      <stop offset="100%" style="stop-color:#2a2a2a" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D4FF" />
      <stop offset="100%" style="stop-color:#A78BFA" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="#0D1117" rx="12" />

  <!-- Glow behind island -->
  <ellipse cx="450" cy="80" rx="180" ry="35" fill="url(#glow)" filter="url(#blur)" opacity="0.4">
    <animate attributeName="rx" values="180;190;180" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.4;0.6;0.4" dur="3s" repeatCount="indefinite" />
  </ellipse>

  <!-- The Island pill shape -->
  <rect x="250" y="50" width="400" height="60" rx="30" fill="url(#pill)" stroke="#3a3a3a" stroke-width="1" />

  <!-- Session dots inside the island -->
  <circle cx="310" cy="72" r="6" fill="#D97706">
    <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="330" cy="72" r="6" fill="#10B981">
    <animate attributeName="opacity" values="1;0.6;1" dur="2.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="350" cy="72" r="6" fill="#6366F1">
    <animate attributeName="opacity" values="1;0.6;1" dur="1.8s" repeatCount="indefinite" />
  </circle>
  <circle cx="370" cy="72" r="6" fill="#EC4899">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.2s" repeatCount="indefinite" />
  </circle>

  <!-- Tool labels -->
  <text x="310" y="96" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">Claude</text>
  <text x="330" y="96" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">Codex</text>
  <text x="350" y="96" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">Gemini</text>
  <text x="370" y="96" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">Cursor</text>

  <!-- Waiting indicator -->
  <rect x="420" y="64" width="80" height="20" rx="10" fill="rgba(251,191,36,0.15)" stroke="#FBBF2480" stroke-width="0.5" />
  <text x="460" y="78" font-family="monospace" font-size="10" fill="#FBBF24" text-anchor="middle">1 waiting</text>

  <!-- Session count -->
  <text x="550" y="78" font-family="monospace" font-size="11" fill="#888">4 ▼</text>

  <!-- Approval card preview -->
  <rect x="270" y="115" width="360" height="35" rx="8" fill="rgba(251,191,36,0.08)" stroke="#FBBF2430" stroke-width="0.5" opacity="0.7" />
  <text x="285" y="135" font-family="monospace" font-size="10" fill="#FBBF24">🔒 Bash</text>
  <text x="340" y="135" font-family="monospace" font-size="9" fill="#666">rm -rf /tmp/test</text>
  <rect x="510" y="120" width="45" height="22" rx="4" fill="rgba(52,211,153,0.2)" />
  <text x="532" y="135" font-family="monospace" font-size="9" fill="#34D399" text-anchor="middle">Allow</text>
  <rect x="560" y="120" width="45" height="22" rx="4" fill="rgba(248,113,113,0.2)" />
  <text x="582" y="135" font-family="monospace" font-size="9" fill="#F87171" text-anchor="middle">Deny</text>

  <!-- Title -->
  <text x="450" y="180" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', monospace" font-size="28" fill="url(#textGrad)" text-anchor="middle" font-weight="bold">Vibe Island</text>
  <text x="450" y="196" font-family="monospace" font-size="11" fill="#666" text-anchor="middle">A Dynamic Island for your AI coding tools</text>
</svg>
